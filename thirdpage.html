    <h1><center>Add Educational Details</center></h1>
    <form>
        <fieldset>
            <label for="Exact Title in Original Language">*Exact Title in Original Language:</label>
            <input type="text" id="Exact Title in Original Language" required> <br>
            <label for="Title of the degree diploma in English or French language eg Bachelor in law">*Title of the degree diploma in English or French language eg Bachelor in law:</label>
            <input type="text" id="Title of the degree diploma in English or French language eg Bachelor in law"><br>
            <label for="Degree/Diploma obtained">*Degree/Diploma obtained:</label>
            <input type="radio" name="Degree/Diploma obtained" id="Yes" value="Yes">
            <label for="Yes">Yes</label>
            <input type="radio" name="Degree/Diploma obtained" id="No" value="No">
            <label for="No">No</label><br>
            <label for="Attended">*Attended:</label>
            <label for="From">From</label>
            <input type="date" name="Attended" id="From:" value="From">
            <label for="To">To</label>
            <input type="date" name="Attended" id="To" value="To"> <br>
            <label for="Type of Institution">*Type of Institution:</label>
            <select name="Type of Institution" id="Type of Institution">
                <option value="">Your Institution</option>
                <option value="UI">University of Ibadan</option>
                <option value="OXFORD">University of Oxford</option>
                <option value="HAVARD">Harvard University</option>
            </select><br>
            <label for="Country">*Country:</label>
            <select name="Country" id="Country">
                <option value="">Your Country</option>
                <option value="NIG">Nigeria</option>
                <option value="UK">Uniited Kingdom</option>
                <option value="USA">Uniited States of America</option>
            </select><br>
            <label for="City Where attended">*City Where attended:</label>
            <input type="text" id="City Where attended"><br>
            <label for="Please enter name of Institution">*Please enter name of Institution:</label>
            <input type="text" id="Please enter name of Institution"><br>
            <label for="Institution Web Site">Institution Web Site:</label>
            <input type="text" id="Institution Web Site"><br>
            <label for="Main Course of Study">*Main Course of Study:</label>
            <select name="Main Course of Study" id="Main Course of Study">
                <option value="">Your Course</option>
                <option value="CSC">Computer Science</option>
                <option value="PSY">Psychology</option>
                <option value="MAT">Mathematics</option>
            </select><br>
            <label for="Field of Study">*Field of Study:</label>
            <select name="Field of Study" id="Field of Study">
                <option value="">Your field</option>
                <option value="">Computing</option>
                <option value="">Social Science</option>
                <option value="">Education</option>
            </select><br>
            <label for="Specialization">Specialization:</label>
            <input type="text" id="Specialization"><br>
            <label for="Enrollment Status">*Enrollment Status:</label>
            <input type="radio" name="Enrollment Status" id="Full_Time" value="Full_Time" >
            <label for="Full_Time">Full_Time</label>
            <input type="radio" name="Enrollment Status" id="Part_Time" value="Part_Time">
            <label for="Part_Time">Part_Time</label><br>
            <Label for="Teaching Method">*Teaching Method:</Label>
            <select name="Teaching Method" id="Teaching Method">
                <option value="">Choose Teaching Method</option>
                <option value="">Physical</option>
                <option value="">Online</option>
            </select> <br>
            <label for="Additional Comments">Additional Comments:</label>
            <input type="text" id="Additional Comments"><br>
            <p>if your exact choice is not listed in the drop-down menus, please select the closest relevant option and explain in the "Additional Comments".</p>
            
        </fieldset>
    </form>
</body>
</html>
